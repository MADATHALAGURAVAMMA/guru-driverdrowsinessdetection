<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        /* Background */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #0f1226;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Login Card */
        .login-container {
            background: #1b1f3a;
            padding: 40px;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.2);
            text-align: center;
        }

        .login-container h2 {
            color: white;
            margin-bottom: 25px;
        }

        /* Input Fields */
        .input-box {
            width: 100%;
            margin-bottom: 15px;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2a2f4a;
            color: white;
            outline: none;
        }

        .input-box input::placeholder {
            color: #aaa;
        }

        /* Button */
        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        /* Register Text */
        .register-text {
            margin-top: 15px;
            color: #ccc;
            font-size: 14px;
        }

        .register-text a {
            color: #9b5cff;
            text-decoration: none;
        }

        .register-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Login</h2>

        <form action="/login" method="POST">
            <div class="input-box">
                <input type="email" name="email" placeholder="Email" required>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button class="login-btn">Login</button>
        </form>

        <div class="register-text">
            Don't have an account? <a href="/register">Register</a>
        </div>
    </div>

</body>
</html>
